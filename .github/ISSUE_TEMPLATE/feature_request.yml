name: Feature request
description: Suggest a new tool, option, or behavior.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this solve? Concrete scenarios are best.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like docpilot to do differently?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or designs you've thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Affected area
      options:
        - tools
        - fetch
        - resolve
        - cache
        - index
        - format
        - recipes
        - config
        - doctor
        - docs
        - other
    validations:
      required: true
