name: Cross-platform smoke

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: npx smoke test (${{ matrix.os }} / Node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Pack
        run: pnpm --filter docpilot-mcp pack --pack-destination .

      - name: Smoke — bash
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tarball=$(ls docpilot-mcp-*.tgz | head -n1)
          npm install -g "./$tarball"
          docpilot --version
          docpilot --help

      - name: Smoke — cmd /c (Windows footgun coverage)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "delims=" %%i in ('dir /b docpilot-mcp-*.tgz') do set TARBALL=%%i
          npm install -g .\%TARBALL%
          cmd /c npx -y docpilot --version
          cmd /c npx -y docpilot --help
