name: Stale issues & PRs

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If it's still relevant, leave a comment
            or remove the `stale` label.
          stale-pr-message: |
            This PR has been inactive for 30 days. It will be closed in 14 days
            unless there is new activity. Push a commit or comment to keep it open.
          close-issue-message: "Closing as stale. Please reopen if still relevant."
          close-pr-message: "Closing as stale. Please reopen if you'd like to continue."
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security"
