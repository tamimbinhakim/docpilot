name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "**/*.md"
      - "scripts/check_links.py"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "**/*.md"
      - "scripts/check_links.py"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  links:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/check_links.py --root docs
      - run: python scripts/check_links.py --root .

  prose:
    name: Prose format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check:md
