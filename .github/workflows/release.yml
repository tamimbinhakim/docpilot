name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:ci

      # The release workflow only runs when there is at least one pending
      # changeset under `.changeset/` (i.e. the previous PR included one).
      # Without this guard, the action runs `pnpm release` on every push to
      # main and tries to re-publish 0.0.0 — which fails noisily.
      - name: Check for pending changesets
        id: pending
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -v -E '(README|TEMPLATE)\.md' | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release PR or publish
        id: changesets
        if: steps.pending.outputs.has_changesets == 'true' || github.event_name == 'workflow_dispatch'
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Generate SBOM
        if: steps.changesets.outputs.published == 'true'
        run: |
          npx @cyclonedx/cdxgen@latest -o sbom.cdx.json -t pnpm
          echo "::notice::SBOM generated at sbom.cdx.json"

      - name: Upload SBOM
        if: steps.changesets.outputs.published == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90
